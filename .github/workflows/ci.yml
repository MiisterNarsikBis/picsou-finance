name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run backend tests
        # The migration test skips itself when Docker is unreachable so local runs
        # without a socket still work. Runners always have Docker, so require it here --
        # otherwise environment drift would silently drop the project's only coverage of
        # a data-mutating migration and the build would stay green.
        env:
          PICSOU_REQUIRE_DOCKER_TESTS: 'true'
        run: mvn -B test
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Lint
        run: bun run lint
        working-directory: frontend
      - name: Typecheck
        run: bun run typecheck
        working-directory: frontend
      - name: Unit tests
        run: bun run test
        working-directory: frontend
