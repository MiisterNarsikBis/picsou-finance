app:
  secure-cookies: false   # HTTP in dev — no Secure flag needed

spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
  devtools:
    restart:
      enabled: true

server:
  error:
    include-stacktrace: on_param   # allow ?trace=true in dev only

logging:
  level:
    com.picsou: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.cors: TRACE
    org.springframework.web.filter.CorsFilter: TRACE
    org.hibernate.SQL: WARN
